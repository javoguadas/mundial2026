<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — Mundial 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><span class="trophy">⚽</span><span class="brand-text">MUNDIAL <strong>2026</strong></span></div>
    <div class="nav-links" id="navLinks">
      <a href="../index.html">Inicio</a>
      <div id="authArea"></div>
    </div>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="trophy-big">⚽</div>
        <h2>MUNDIAL 2026</h2>
        <p style="color:var(--text-dim);font-size:.85rem;margin-top:.3rem">Quiniela &amp; Estadísticas</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin" onclick="mostrarTab('login')">Iniciar Sesión</div>
        <div class="auth-tab" id="tabReg" onclick="mostrarTab('registro')">Registrarse</div>
      </div>

      <!-- LOGIN -->
      <div id="formLogin">
        <div id="alertLogin"></div>
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="loginUser" placeholder="nombre_usuario" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary btn-full" id="btnLogin" onclick="login()">Entrar</button>
      </div>

      <!-- REGISTRO -->
      <div id="formReg" class="hidden">
        <div id="alertReg"></div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="regNombre" placeholder="Nombre"/>
        </div>
        <div class="form-group">
          <label>Apellido <span style="color:var(--text-dim);font-weight:400">(opcional)</span></label>
          <input type="text" id="regApellido" placeholder="Apellido"/>
        </div>
        <div class="form-group">
          <label>Nombre de usuario</label>
          <input type="text" id="regUsername" placeholder="ej: carlos_21"
            oninput="this.value=this.value.toLowerCase().replace(/\s/g,'_')"/>
          <small style="color:var(--text-dim);font-size:.72rem">Solo letras, números, guion bajo. Sin espacios.</small>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="regPass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
        </div>
        <button class="btn btn-primary btn-full" id="btnReg" onclick="registrar()">Crear cuenta</button>
      </div>
    </div>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth-ui.js"></script>
  <script>
    if (SBAuth.getSession()) {
      const p = JSON.parse(localStorage.getItem('user_profile') || 'null');
      window.location.href = p?.es_admin ? '../pages/admin.html' : '../index.html';
    }

    function mostrarTab(tab) {
      document.getElementById('formLogin').classList.toggle('hidden', tab !== 'login');
      document.getElementById('formReg').classList.toggle('hidden', tab !== 'registro');
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabReg').classList.toggle('active', tab === 'registro');
      document.getElementById('alertLogin').innerHTML = '';
      document.getElementById('alertReg').innerHTML = '';
    }

    async function login() {
      const username = document.getElementById('loginUser').value.trim().toLowerCase();
      const pass     = document.getElementById('loginPass').value;
      const alEl     = document.getElementById('alertLogin');
      const btn      = document.getElementById('btnLogin');
      if (!username || !pass) {
        alEl.innerHTML = '<div class="alert alert-error">Ingresa tu usuario y contraseña.</div>';
        return;
      }
      btn.disabled = true; btn.textContent = 'Ingresando...';
      try {
        const data = await SBAuth.login(username, pass);
        const profile = await SBAuth.getProfile(data.user.id);
        localStorage.setItem('user_profile', JSON.stringify(profile));
        window.location.href = profile?.es_admin ? '../pages/admin.html' : '../index.html';
      } catch (e) {
        alEl.innerHTML = `<div class="alert alert-error">❌ ${e.message || 'Usuario o contraseña incorrectos'}</div>`;
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }

    async function registrar() {
      const nombre   = document.getElementById('regNombre').value.trim();
      const apellido = document.getElementById('regApellido').value.trim();
      const username = document.getElementById('regUsername').value.trim().toLowerCase();
      const pass     = document.getElementById('regPass').value;
      const alEl     = document.getElementById('alertReg');
      const btn      = document.getElementById('btnReg');
      if (!nombre || !username || !pass) {
        alEl.innerHTML = '<div class="alert alert-error">Nombre, usuario y contraseña son obligatorios.</div>';
        return;
      }
      if (!/^[a-z0-9_]+$/.test(username)) {
        alEl.innerHTML = '<div class="alert alert-error">El usuario solo puede tener letras, números y guion bajo (_).</div>';
        return;
      }
      if (pass.length < 6) {
        alEl.innerHTML = '<div class="alert alert-error">La contraseña debe tener al menos 6 caracteres.</div>';
        return;
      }
      btn.disabled = true; btn.textContent = 'Creando cuenta...';
      const nombreCompleto = apellido ? `${nombre} ${apellido}` : nombre;
      try {
        await SBAuth.register(username, pass, nombreCompleto);
        alEl.innerHTML = `<div class="alert alert-success">
          ✅ ¡Cuenta creada! Ya puedes iniciar sesión.
        </div>`;
        setTimeout(() => {
          document.getElementById('loginUser').value = username;
          mostrarTab('login');
        }, 1500);
      } catch (e) {
        let msg = e.message || 'Error al crear la cuenta';
        if (msg.includes('already registered') || msg.includes('already been registered')) {
          msg = 'Ese nombre de usuario ya está en uso. Elige otro.';
        }
        alEl.innerHTML = `<div class="alert alert-error">❌ ${msg}</div>`;
      }
      btn.disabled = false; btn.textContent = 'Crear cuenta';
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (!document.getElementById('formReg').classList.contains('hidden')) registrar();
      else login();
    });
  </script>
</body>
</html>
